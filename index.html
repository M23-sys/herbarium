<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2E5A44">
<title>Herbarium clinicum</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--paper:#E7EAE0;--surface:#F4F6EF;--surface2:#EEF1E7;--ink:#1C2621;--soft:#4A574F;--line:#CBD2C2;
--green:#2E5A44;--green2:#6B8F71;--amber:#9C7526;--amberbg:#F1E7CF;--danger:#9A2E1C;--dangerbg:#F2DBD3;
--info:#3A5A7A;--infobg:#DCE6EE;--nav:72px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.55 'Inter',system-ui,-apple-system,sans-serif;
padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
h1{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:29px;line-height:1.1;margin:0 0 8px;letter-spacing:-.3px}
h2{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:20px;margin:0}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace}
.latin{font-family:'IBM Plex Mono',ui-monospace,monospace;font-style:italic;font-size:12px;color:var(--green2)}
.soft{color:var(--soft)}
.eyebrow{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--green);margin:0 0 6px}
.lede{color:var(--soft);font-size:14px;margin:0 0 18px}
header.top{background:var(--surface);border-bottom:1px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.mark{font-size:22px;color:var(--green);line-height:1}
.brandn{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:16px}
.brands{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}
main{padding:22px 18px 30px;max-width:760px;margin:0 auto}
nav.bot{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom));
padding-bottom:env(safe-area-inset-bottom);background:var(--surface);border-top:1px solid var(--line);
display:flex;z-index:30}
nav.bot button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:3px;font:10px 'Inter',system-ui,sans-serif;color:var(--soft);cursor:pointer;padding:8px 1px;min-width:0}
nav.bot button .ic{font-size:19px;line-height:1}
nav.bot button.on{color:var(--green);font-weight:600}
input,textarea,select{font:15px 'Inter',system-ui,sans-serif;color:var(--ink);background:var(--surface);
border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--green)}
input::placeholder{color:#9AA695}
.search{font-family:Fraunces,Georgia,serif;font-size:18px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
.chip{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:var(--green);background:var(--surface2);
border:1px solid var(--line);border-radius:18px;padding:6px 12px;cursor:pointer;width:auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-bottom:12px;cursor:pointer}
.card:active{border-color:var(--green2)}
.cname{font-family:Fraunces,Georgia,serif;font-size:19px;font-weight:600;line-height:1.15}
.cind{margin-top:9px;font-weight:600;color:var(--green);font-size:14px}
.cexp{margin:5px 0 0;font-size:13px;color:var(--soft)}
.csrc{margin:5px 0 0;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;color:var(--green2)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.flags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.flag{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.03em;padding:3px 7px;
border-radius:5px;text-transform:uppercase;font-weight:500}
.f-danger{background:var(--dangerbg);color:var(--danger)}
.f-caution{background:var(--amberbg);color:var(--amber)}
.f-info{background:var(--infobg);color:var(--info)}
.f-safe{background:#DDEBDD;color:var(--green)}
.ev{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.evb{display:inline-flex;gap:2.5px;align-items:flex-end}
.evbar{width:5px;height:14px;border-radius:2px;border:1px solid var(--green2);background:transparent}
.evbar.on{background:var(--green);border-color:var(--green)}
.evtag{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;color:var(--soft)}
.legend{margin-top:16px;border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden}
.legend summary{padding:12px 15px;font-size:13px;color:var(--soft);cursor:pointer;list-style:none;display:flex;gap:8px;align-items:center}
.legend summary::-webkit-details-marker{display:none}
.legend-in{padding:2px 15px 14px;border-top:1px solid var(--line)}
.lrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:12px;color:var(--soft)}
.lrow:first-child{border-top:none}
.lrow b{color:var(--ink)}
.ltag{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;width:72px;flex-shrink:0}
.lfoot{font-size:11.5px;color:var(--soft);font-style:italic;margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line)}
.tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin:4px -18px 18px;padding:0 18px 2px;
-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font:13.5px 'Inter',system-ui,sans-serif;color:var(--soft);background:none;border:none;padding:9px 12px;cursor:pointer;
border-bottom:2px solid transparent;margin-bottom:-3px;white-space:nowrap}
.tab.on{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.block{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-bottom:14px}
.btitle{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
color:var(--green);margin:0 0 10px;font-weight:500}
.block p{margin:0 0 7px;font-size:14px}
.block p:last-child{margin-bottom:0}
.block ul{margin:0;padding-left:17px;font-size:14px}
.block li{margin:4px 0}
.ind{padding:11px 0;border-top:1px solid var(--line)}
.ind:first-child{border-top:none;padding-top:0}
.indtop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.indname{font-weight:600;font-size:14px}
.pair{border-radius:11px;padding:13px 14px;border:1px solid var(--line);background:var(--surface);margin-bottom:9px}
.p-danger{border-color:var(--danger);background:var(--dangerbg)}
.p-caution{border-color:#D9BE7E;background:var(--amberbg)}
.ptop{display:flex;justify-content:space-between;align-items:center;gap:8px}
.ptop b{font-family:Fraunces,Georgia,serif;font-size:15px}
.tox{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9.5px;text-transform:uppercase;padding:3px 7px;border-radius:5px;white-space:nowrap}
.t-d{background:var(--danger);color:#fff}.t-c{background:#D9BE7E;color:#5C4413}.t-s{background:var(--green2);color:#fff}
.pnote{margin:7px 0 0;font-size:12.5px}
.banner{background:var(--dangerbg);border:1px solid var(--danger);color:var(--danger);border-radius:11px;
padding:13px 15px;font-size:13.5px;font-weight:500;margin-bottom:12px}
.banner-i{background:var(--infobg);border-color:var(--info);color:var(--info)}
.back{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:var(--green);background:none;border:none;
padding:0;margin-bottom:12px;cursor:pointer;width:auto}
.calm{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.cm{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:var(--soft);background:var(--surface);
border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer;width:auto;flex:1;min-width:44px}
.cm.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.corgan{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:var(--green);background:var(--surface2);
padding:3px 7px;border-radius:5px}
.strip{display:flex;gap:2px;margin:9px 0 7px}
.cell{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9px;flex:1;height:20px;display:flex;align-items:center;
justify-content:center;border-radius:4px;background:var(--surface2);color:var(--soft);border:1px solid var(--line)}
.cell.on{background:var(--green2);color:#fff;border-color:var(--green2)}
.cell.now{outline:2px solid var(--green);outline-offset:1px}
.cell.on.now{background:var(--green)}
.btn{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12.5px;color:#fff;background:var(--green);
border:1px solid var(--green);border-radius:9px;padding:11px 15px;cursor:pointer;width:auto;display:inline-block;text-align:center}
.btn-o{color:var(--green);background:var(--surface);border-color:var(--green2)}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.msg{padding:12px 15px;border-radius:10px;font-size:13px;margin:12px 0}
.msg.ok{background:#DDEBDD;color:var(--green);border:1px solid var(--green2)}
.msg.err{background:var(--dangerbg);color:var(--danger);border:1px solid var(--danger)}
.empty{padding:16px;background:var(--surface2);border:1px dashed var(--line);border-radius:11px;color:var(--soft);font-size:14px}
.photos{display:flex;gap:9px;flex-wrap:wrap;margin-top:9px}
.ph{position:relative;width:88px;height:88px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.phx{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;border:none;
background:rgba(28,38,33,.72);color:#fff;font-size:15px;line-height:1;cursor:pointer;padding:0}
.itag{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9px;text-transform:uppercase;background:var(--infobg);
color:var(--info);padding:2px 5px;border-radius:4px;vertical-align:middle}
.hero{background:var(--green);color:#fff;border-radius:16px;padding:20px;margin-bottom:16px}
.hero h1{color:#fff;margin-bottom:6px}
.hero p{margin:0;font-size:13.5px;opacity:.85}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px;cursor:pointer;text-align:left}
.tile .ic{font-size:20px}
.tile b{display:block;font-family:Fraunces,Georgia,serif;font-size:15px;margin:6px 0 2px}
.tile span{font-size:12px;color:var(--soft)}

.imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.slot{position:relative;aspect-ratio:1;border-radius:10px;border:1.5px dashed var(--line);background:var(--surface2);
display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.slot.has{border-style:solid;border-color:var(--line)}
.slot img{width:100%;height:100%;object-fit:cover;display:block}
.slot .plus{font-size:22px;color:var(--green2)}
.slot .lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(28,38,33,.72);color:#fff;font-size:9px;
padding:3px 4px;text-align:center;font-family:'IBM Plex Mono',ui-monospace,monospace}
.slot .del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:none;
background:rgba(28,38,33,.75);color:#fff;font-size:13px;line-height:1;padding:0;cursor:pointer;display:none}
.slot.has .del{display:block}
.vs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.vs .side{text-align:center}
.vs .side .slot{aspect-ratio:1}
.vs .cap{font-size:10.5px;margin-top:4px;font-weight:600}
.vs .cap i{display:block;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:400;font-size:9.5px;opacity:.75}
.modal{position:fixed;inset:0;background:rgba(28,38,33,.55);z-index:50;display:flex;align-items:flex-end}
.sheet{background:var(--paper);width:100%;max-height:88vh;border-radius:18px 18px 0 0;padding:18px;
overflow-y:auto;padding-bottom:calc(18px + env(safe-area-inset-bottom))}
.sheet h2{margin-bottom:4px}
.sheet .close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;color:var(--soft);
cursor:pointer;width:auto;padding:0}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.wg{aspect-ratio:1;border-radius:9px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:var(--surface2)}
.wg img{width:100%;height:100%;object-fit:cover;display:block}
.spin{text-align:center;padding:26px;color:var(--soft);font-size:14px}
.bar{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:10px 0}
.bar div{height:100%;background:var(--green);width:0;transition:width .2s}

.map{position:relative;width:100%;height:300px;border-radius:12px;overflow:hidden;border:1px solid var(--line);
background:#DDE3D6;touch-action:none;user-select:none}
.map.sm{height:210px}
.mlayer{position:absolute;inset:0;will-change:transform}
.mt{position:absolute;width:256px;height:256px;pointer-events:none}
.mt.miss{background:repeating-linear-gradient(45deg,#DDE3D6,#DDE3D6 8px,#D2D9CA 8px,#D2D9CA 16px)}
.pin{position:absolute;transform:translate(-50%,-100%);font-size:22px;line-height:1;pointer-events:auto;cursor:pointer;
filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.me{position:absolute;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#3A7BD5;
border:2.5px solid #fff;box-shadow:0 0 0 2px rgba(58,123,213,.35);pointer-events:none}
.mctl{position:absolute;right:9px;top:9px;display:flex;flex-direction:column;gap:5px;z-index:3}
.mctl button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:rgba(244,246,239,.93);
color:var(--ink);font-size:17px;line-height:1;padding:0;cursor:pointer}
.mattr{position:absolute;bottom:0;right:0;background:rgba(244,246,239,.82);font-size:8.5px;color:var(--soft);
padding:2px 5px;border-radius:5px 0 0 0;z-index:2}
.find{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.find:first-child{border-top:none}
.find .fi{flex:1;min-width:0}
.find .fn{font-weight:600;font-size:14px}
.find .fm{font-size:12px;color:var(--soft)}
.find .fd{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:var(--green);white-space:nowrap;text-align:right}
.find .fx{background:none;border:none;color:var(--soft);font-size:17px;cursor:pointer;width:auto;padding:2px 4px}
.pickrow{display:flex;gap:7px;margin-top:10px}
.pickrow input{flex:1}
.pickrow button{width:auto;flex-shrink:0}

.idbox{border:2px dashed var(--line);border-radius:14px;padding:26px 18px;text-align:center;background:var(--surface)}
.idbox .ic{font-size:34px;display:block;margin-bottom:8px}
.res{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px}
.res.match{border-color:var(--green);border-width:2px}
.res.danger{border-color:var(--danger);border-width:2px;background:var(--dangerbg)}
.res .rt{display:flex;justify-content:space-between;align-items:center;gap:10px}
.res .rn{font-family:Fraunces,Georgia,serif;font-size:17px;font-weight:600}
.score{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;padding:3px 8px;border-radius:6px;
background:var(--surface2);color:var(--soft);white-space:nowrap}
.score.hi{background:var(--green);color:#fff}
.prev{width:100%;max-height:240px;object-fit:contain;border-radius:12px;border:1px solid var(--line);margin-bottom:12px;background:var(--surface2)}
.organs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.organ{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;padding:7px 11px;border-radius:8px;
border:1px solid var(--line);background:var(--surface);color:var(--soft);cursor:pointer;width:auto}
.organ.on{background:var(--green);color:#fff;border-color:var(--green)}
.key{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px}
@media(min-width:700px){.cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cards2 .card{margin-bottom:0}}
</style>
</head>
<body>
<header class="top"><span class="mark">✽</span><div><div class="brandn">Herbarium clinicum</div><div class="brands" id="sub">14 Kräuter · v12</div></div></header>
<main id="app"></main>
<div id="modal" class="modal" style="display:none" onclick="closePicker()"></div>
<nav class="bot">
<button data-v="search" class="on"><span class="ic">⌕</span>Nutzen</button>
<button data-v="cal"><span class="ic">☷</span>Ernte</button>
<button data-v="map"><span class="ic">◉</span>Karte</button>
<button data-v="reg"><span class="ic">⚠</span>Register</button>
<button data-v="cat"><span class="ic">☰</span>Katalog</button>
<button data-v="id"><span class="ic">📷</span>Bestimmen</button>
</nav>

function evStrength(tag) {
  return Math.max(...String(tag).split('/').map(t =>
    t.includes('WEU') || t.includes('RCT') ? 4 : t.includes('ESCOP') ? 3 : t.includes('TU') ? 2 : 1));
}
function evHTML(tag) {
  const s = evStrength(tag);

  for (let i = 1; i <= 4; i++) bars += `<span class="evbar${i <= s ? ' on' : ''}" style="opacity:${i <= s ? .35 + i * .16 : 1}"></span>`;
  return `<span class="ev"><span class="evb">${bars}</span><span class="evtag">${esc(tag)}</span></span>`;
}

/* ================= BILDER (IndexedDB — hunderte MB Platz) ================= */
const IDB = {
  db: null,
  open() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('herbarium-img', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('img');
      r.onsuccess = () => { IDB.db = r.result; res(r.result); };
      r.onerror = () => rej(r.error);
    });
  },
  async tx(mode) { const db = IDB.db || await IDB.open(); return db.transaction('img', mode).objectStore('img'); },
  async get(k) { const s = await IDB.tx('readonly'); return new Promise(r => { const q = s.get(k); q.onsuccess = () => r(q.result || null); q.onerror = () => r(null); }); },
  async set(k, v) { const s = await IDB.tx('readwrite'); return new Promise(r => { const q = s.put(v, k); q.onsuccess = () => r(1); q.onerror = () => r(0); }); },
  async del(k) { const s = await IDB.tx('readwrite'); return new Promise(r => { const q = s.delete(k); q.onsuccess = () => r(1); q.onerror = () => r(0); }); },
  async keys() { const s = await IDB.tx('readonly'); return new Promise(r => { const q = s.getAllKeys(); q.onsuccess = () => r(q.result || []); q.onerror = () => r([]); }); },
  async clear() { const s = await IDB.tx('readwrite'); return new Promise(r => { const q = s.clear(); q.onsuccess = () => r(1); q.onerror = () => r(0); }); }
};
const objURL = new Map();
async function imgSrc(k) {
  if (objURL.has(k)) return objURL.get(k);
  const v = await IDB.get(k);
  if (!v) return null;
  if (typeof v === 'string') { objURL.set(k, v); return v; }   // Fallback: gespeicherte Adresse
  const u = URL.createObjectURL(v);
  objURL.set(k, u);
  return u;
}
/* Speichert ein Bild: bevorzugt als Datei (echt offline).
   Scheitert der Download an CORS, wird die Adresse gemerkt —
   ein <img> lädt sie trotzdem, und der Service Worker legt sie in den Cache. */
async function saveRemote(k, url) {
  let okBlob = false;
  try { await IDB.set(k, await fetchBlob(url)); okBlob = true; }
  catch (e) { await IDB.set(k, url); }
  objURL.delete(k);
  return okBlob;
}
async function hydrate() {
  for (const el of document.querySelectorAll('img[data-k]')) {
    const u = await imgSrc(el.dataset.k);
    if (u) { el.src = u; const s = el.closest('.slot'); if (s) s.classList.add('has'); }
  }
}
async function delImg(k) {
  if (!confirm('Bild entfernen?')) return;
  await IDB.del(k);
  if (objURL.has(k)) { URL.revokeObjectURL(objURL.get(k)); objURL.delete(k); }
  render();
}

/* --- Wikimedia Commons: Bilder zu einem botanischen Namen finden --- */
async function wikiFind(latin, n) {
  // WICHTIG: action=query — ohne das antwortet die API mit einer Hilfeseite statt mit Bildern.
  const base = 'https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*'
             + '&prop=imageinfo&iiprop=url&iiurlwidth=500';
  const clean = String(latin || '')
    .replace(/\s*\(.*?\)\s*/g, ' ')
    .replace(/\s+(L\.|spp?\.|×|syn\.)\s*/gi, ' ')
    .replace(/\s+/g, ' ').trim();
  const genus = clean.split(' ')[0];

  const tries = [
    // 1. Commons-Kategorie der Art (meist die beste Quelle)
    base + '&generator=categorymembers&gcmtype=file&gcmlimit=' + n + '&gcmtitle=' + encodeURIComponent('Category:' + clean),
    // 2. Volltextsuche nach Dateien
    base + '&generator=search&gsrnamespace=6&gsrlimit=' + n + '&gsrsearch=' + encodeURIComponent(clean),
    // 3. Nur die Gattung (Rückfallebene)
    base + '&generator=search&gsrnamespace=6&gsrlimit=' + n + '&gsrsearch=' + encodeURIComponent(genus)
  ];

  let lastErr = null;
  for (const url of tries) {
    try {
      const r = await fetch(url);
      if (!r.ok) { lastErr = 'HTTP ' + r.status; continue; }
      const j = await r.json();
      const pages = j && j.query && j.query.pages ? Object.values(j.query.pages) : [];
      const hits = pages
        .filter(p => p.imageinfo && p.imageinfo[0] && p.imageinfo[0].thumburl)
        .map(p => ({ thumb: p.imageinfo[0].thumburl, title: (p.title || '').replace(/^File:/, '') }));
      if (hits.length) return hits;
    } catch (e) { lastErr = e.message; }
  }
  if (lastErr) wikiFind.lastErr = lastErr;
  return [];
}

async function fetchBlob(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.blob();
}


/* --- Diagnose: zeigt im Klartext, was Wikimedia antwortet --- */
async function wikiDiag() {
  msg = { ok: 1, t: 'Teste Verbindung zu Wikimedia Commons …' };
  render();
  const url = 'https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*'
            + '&prop=imageinfo&iiprop=url&iiurlwidth=500'
            + '&generator=categorymembers&gcmtype=file&gcmlimit=3&gcmtitle='
            + encodeURIComponent('Category:Allium ursinum');
  try {
    const r = await fetch(url);
    if (!r.ok) { msg = { ok: 0, t: 'Antwort: HTTP ' + r.status + ' — Server erreichbar, liefert aber Fehler.' }; render(); return; }
    const j = await r.json();
    const n = j && j.query && j.query.pages ? Object.keys(j.query.pages).length : 0;
    msg = n
      ? { ok: 1, t: '✓ Verbindung steht. ' + n + ' Bilder zu Allium ursinum gefunden. Die Bildersuche sollte funktionieren.' }
      : { ok: 0, t: 'Verbindung steht, aber keine Bilder im Ergebnis. Antwort enthielt: ' + Object.keys(j || {}).join(', ') };
  } catch (e) {
    msg = { ok: 0, t: 'Verbindung fehlgeschlagen: ' + e.message + ' — bist du online?' };
  }
  render();
}

function pickFile(e) {
  const f = e.target.files[0]; if (!f || !pick) return;
  const k = pick.key;
  const img = new Image(), fr = new FileReader();
  fr.onload = () => { img.onload = () => {
    const max = 800, sc = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = img.width * sc; cv.height = img.height * sc;
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    cv.toBlob(async b => { await IDB.set(k, b); objURL.delete(k); closePicker(); }, 'image/jpeg', .8);
  }; img.src = fr.result; };
  fr.readAsDataURL(f); e.target.value = '';
}

    (h.conf || []).forEach((c, i) => { if (c.l) jobs.push({ k: h.id + ':c' + i, latin: c.l }); });
  }
  bulk = { done: 0, total: jobs.length, ok: 0 };
  render();

  for (const j of jobs) {

    ? { ok: 1, t: bulk.ok + ' von ' + bulk.total + ' Bildern gespeichert' +

const saveFinds = () => LS.set('finds', finds);

let mapFilter = '';                              // '' = alle
let here = null;                                 // aktuelle GPS-Position
let tileMsg = null;

/* --- Slippy-Map-Mathematik --- */
const P = z => Math.pow(2, z);
const lon2x = (lo, z) => (lo + 180) / 360 * P(z);
const lat2y = (la, z) => { const r = la * Math.PI / 180; return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * P(z); };
const x2lon = (x, z) => x / P(z) * 360 - 180;
const y2lat = (y, z) => { const n = Math.PI - 2 * Math.PI * y / P(z); return 180 / Math.PI * Math.atan(.5 * (Math.exp(n) - Math.exp(-n))); };

/* --- Entfernung & Himmelsrichtung (funktioniert IMMER, auch ohne Karte) --- */
function dist(a, b, c, d) {
  const R = 6371000, p = Math.PI / 180;
  const h = .5 - Math.cos((c - a) * p) / 2 + Math.cos(a * p) * Math.cos(c * p) * (1 - Math.cos((d - b) * p)) / 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function bearing(a, b, c, d) {
  const p = Math.PI / 180, y = Math.sin((d - b) * p) * Math.cos(c * p);
  const x = Math.cos(a * p) * Math.sin(c * p) - Math.sin(a * p) * Math.cos(c * p) * Math.cos((d - b) * p);
  return (Math.atan2(y, x) / p + 360) % 360;
}
const COMPASS = ['N', 'NO', 'O', 'SO', 'S', 'SW', 'W', 'NW'];
const fmtDist = m => m < 1000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km';
function relTo(f) {
  if (!here) return '';
  const d = dist(here.lat, here.lon, f.lat, f.lon);
  const b = COMPASS[Math.round(bearing(here.lat, here.lon, f.lat, f.lon) / 45) % 8];
  return fmtDist(d) + ' · ' + b;
}

/* --- Kacheln: aus IndexedDB, sonst laden (nur online) --- */
async function tileSrc(z, x, y) {
  const k = 't:' + z + '/' + x + '/' + y;
  if (objURL.has(k)) return objURL.get(k);
  let b = await IDB.get(k);
  if (!b) {
    try {
      const r = await fetch(`https://tile.openstreetmap.org/${z}/${x}/${y}.png`);
      if (!r.ok) return null;
      b = await r.blob();
      await IDB.set(k, b);
    } catch (e) { return null; }
  }
  const u = URL.createObjectURL(b);
  objURL.set(k, u);
  return u;
}
async function hydrateTiles() {
  for (const el of document.querySelectorAll('img[data-t]')) {
    const [z, x, y] = el.dataset.t.split('/').map(Number);
    const u = await tileSrc(z, x, y);
    if (u) { el.src = u; el.classList.remove('miss'); }
  }
}

/* --- Karte zeichnen --- */
function mapHTML(list, small, herbId) {
  const W = 340, H = small ? 210 : 300;   // Näherung; Pins werden per % gesetzt
  const z = mapS.z;
  const cx = lon2x(mapS.lon, z) * 256, cy = lat2y(mapS.lat, z) * 256;
  const x0 = cx - W / 2, y0 = cy - H / 2;
  const t0x = Math.floor(x0 / 256), t1x = Math.floor((x0 + W) / 256);
  const t0y = Math.floor(y0 / 256), t1y = Math.floor((y0 + H) / 256);
  let tiles = '';
  for (let tx = t0x; tx <= t1x; tx++) for (let ty = t0y; ty <= t1y; ty++) {
    if (ty < 0 || ty >= P(z)) continue;
    const wx = ((tx % P(z)) + P(z)) % P(z);
    tiles += `<img class="mt miss" data-t="${z}/${wx}/${ty}" style="left:${tx * 256 - x0}px;top:${ty * 256 - y0}px" alt="">`;
  }
  const pins = list.map(f => {
    const px = lon2x(f.lon, z) * 256 - x0, py = lat2y(f.lat, z) * 256 - y0;
    if (px < -30 || px > W + 30 || py < -30 || py > H + 30) return '';
    const h = herbs.find(x => x.id === f.herb);
    return `<span class="pin" style="left:${px}px;top:${py}px" title="${esc(h ? h.common : '')}"
      onclick="event.stopPropagation();openHerb('${f.herb}')">📍</span>`;
  }).join('');
  const meDot = here ? (() => {
    const px = lon2x(here.lon, z) * 256 - x0, py = lat2y(here.lat, z) * 256 - y0;
    return `<span class="me" style="left:${px}px;top:${py}px"></span>`;
  })() : '';
  return `<div class="map${small ? ' sm' : ''}" id="map">
    <div class="mlayer" id="mlayer">${tiles}${pins}${meDot}</div>
    <div class="mctl">
      <button onclick="mapZ(1)">+</button>
      <button onclick="mapZ(-1)">−</button>
      <button onclick="locate()" title="Mein Standort">◎</button>
    </div>
    <span class="mattr">© OpenStreetMap</span>
  </div>`;
}
function mapZ(d) { mapS.z = Math.max(6, Math.min(18, mapS.z + d)); render(); }

/* --- Standort --- */
function locate(then) {
  if (!navigator.geolocation) { alert('Standort wird nicht unterstützt.'); return; }
  navigator.geolocation.getCurrentPosition(p => {
    here = { lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy };
    mapS.lat = here.lat; mapS.lon = here.lon;
    if (then) then(); else render();
  }, e => alert('Standort nicht verfügbar: ' + e.message), { enableHighAccuracy: true, timeout: 12000 });
}
function logFind(herbId) {
  locate(() => {
    finds.push({ id: Date.now(), herb: herbId, lat: here.lat, lon: here.lon, t: Date.now(), note: '' });
    saveFinds();

    render();

}
function delFind(id) {
  const f = finds.find(x => x.id === id);
  const h = f ? herbs.find(x => x.id === f.herb) : null;
  const when = f ? new Date(f.t).toLocaleDateString('de-DE') : '';
  if (!confirm('Fundort löschen?\n\n' + (h ? h.common : '') + ' · ' + when + '\n\nDas lässt sich nicht rückgängig machen.')) return;
  finds = finds.filter(x => x.id !== id);

  render();
}

/* --- Kartenbereich vorladen (offline) --- */
let pre = null;
async function preload() {
  const z0 = mapS.z, list = [];
  for (let z = z0; z <= Math.min(z0 + 2, 17); z++) {
    const cx = lon2x(mapS.lon, z), cy = lat2y(mapS.lat, z);
    const r = z === z0 ? 2 : z === z0 + 1 ? 3 : 5;
    for (let dx = -r; dx <= r; dx++) for (let dy = -r; dy <= r; dy++)
      list.push([z, Math.floor(cx) + dx, Math.floor(cy) + dy]);
  }
  const capped = list.slice(0, 200);   // bewusst begrenzt (OSM-Nutzungsregeln)
  pre = { done: 0, total: capped.length };
  render();
  for (const [z, x, y] of capped) { await tileSrc(z, x, y); pre.done++; if (pre.done % 8 === 0) render(); }
  pre = null;
  msg = { ok: 1, t: capped.length + ' Kartenkacheln offline gespeichert.' };
  render();
}


/* --- Karte per Finger verschieben + Zwei-Finger-Zoom --- */
function bindMap() {
  const m = document.getElementById('map');
  const L = document.getElementById('mlayer');
  if (!m || !L) return;
  const pts = new Map();
  let sx = 0, sy = 0, moved = false, pinch0 = 0, scale = 1;
  const spread = () => { const a = [...pts.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); };

  m.addEventListener('pointerdown', e => {
    if (e.target.closest('.mctl') || e.target.closest('.pin')) return;
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    try { m.setPointerCapture(e.pointerId); } catch (err) {}
    if (pts.size === 1) { sx = e.clientX; sy = e.clientY; moved = false; }
    if (pts.size === 2) { pinch0 = spread(); scale = 1; }
  });

  m.addEventListener('pointermove', e => {
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pts.size >= 2) {                              // Zwei-Finger-Zoom
      const d = spread();
      if (pinch0 > 0) { scale = d / pinch0; L.style.transform = 'scale(' + scale + ')'; }
      moved = true;
      return;
    }
    const dx = e.clientX - sx, dy = e.clientY - sy;   // Verschieben
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    L.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  });

  const end = e => {
    if (!pts.has(e.pointerId)) return;
    const wasPinch = pts.size >= 2;
    pts.delete(e.pointerId);
    if (wasPinch) {
      pts.clear();
      L.style.transform = '';
      const dz = Math.round(Math.log(scale || 1) / Math.log(2));
      scale = 1;
      if (dz) mapZ(dz); else render();
      return;
    }
    if (pts.size > 0) return;
    L.style.transform = '';
    if (!moved) return;
    const dx = e.clientX - sx, dy = e.clientY - sy, z = mapS.z;
    mapS.lon = x2lon(lon2x(mapS.lon, z) - dx / 256, z);
    mapS.lat = y2lat(lat2y(mapS.lat, z) - dy / 256, z);
    render();
  };
  m.addEventListener('pointerup', end);
  m.addEventListener('pointercancel', end);
}

/* Foto aufnehmen/wählen und verkleinern (schont Datenvolumen) */
function pnPick(e) {
  const f = e.target.files[0]; if (!f) return;
  const img = new Image(), fr = new FileReader();
  fr.onload = () => { img.onload = () => {
    const max = 1024, sc = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = img.width * sc; cv.height = img.height * sc;
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    cv.toBlob(b => { pnPhoto = { dataUrl: cv.toDataURL('image/jpeg', .85), blob: b }; pnRes = null; pnErr = null; render(); },

/* Anfrage an Pl@ntNet — der Schlüssel liegt NUR auf dem Gerät, nie auf GitHub */
let pnProject = LS.get('pnProject', 'all');
let pnProxy = LS.get('pnProxy', '');   // Zwischenserver (Cloudflare Worker)

async function pnCall(project) {
  const fd = new FormData();
  fd.append('images', pnPhoto.blob, 'photo.jpg');
  fd.append('organs', pnOrgan);
  // Mit Zwischenserver (nötig, weil Pl@ntNet Browser-Anfragen blockiert)
  const url = pnProxy
    ? pnProxy.replace(/\/+$/, '') + '?api-key=' + encodeURIComponent(pnKey) + '&project=' + encodeURIComponent(project)
    : 'https://my-api.plantnet.org/v2/identify/' + project
      + '?api-key=' + encodeURIComponent(pnKey)
      + '&include-related-images=false&nb-results=5';
  const r = await fetch(url, { method: 'POST', body: fd });
  let body = null;
  try { body = await r.json(); } catch (e) { /* kein JSON */ }
  return { r, body };
}

async function pnIdentify() {
  if (!pnKey) { pnErr = 'Kein API-Schlüssel hinterlegt.'; render(); return; }
  if (!pnPhoto) { pnErr = 'Kein Foto ausgewählt.'; render(); return; }
  pnBusy = true; pnErr = null; pnRes = null; render();

  try {
    let { r, body } = await pnCall(pnProject);

    // 403/404 beim Spezialprojekt? -> automatisch mit "all" erneut versuchen
    if ((r.status === 403 || r.status === 404) && pnProject !== 'all') {
      const retry = await pnCall('all');
      if (retry.r.ok) { pnProject = 'all'; LS.set('pnProject', 'all'); r = retry.r; body = retry.body; }
    }

    if (!r.ok) {
      // Pl@ntNets EIGENE Begründung anzeigen — die sagt uns, was wirklich los ist
      const server = body && (body.message || body.error) ? String(body.message || body.error) : '';
      if (r.status === 401) throw new Error('Schlüssel abgelehnt (401). Stimmt der Schlüssel? ' + server);
      if (r.status === 403) {
        if (/cors|origin/i.test(server)) throw new Error(
          'Pl@ntNet blockiert Anfragen direkt aus dem Browser (403: "' + server + '").\n\n' +
          'Das ist Absicht — sie wollen verhindern, dass API-Schlüssel in Webseiten stehen.\n\n' +
          'LÖSUNG: Richte den kostenlosen Zwischenserver ein (Anleitung: PLANTNET-PROXY.md) und trage seine Adresse unten ein. Dauert ~10 Minuten, ohne Programmieren.');
        throw new Error('Zugriff verweigert (403). Server sagt: "' + (server || 'keine Begründung') +
          '"\n\nHäufigste Gründe: Schlüssel noch nicht aktiviert, falsch kopiert, oder Projekt nicht freigeschaltet.');
      }
      if (r.status === 404) throw new Error('Keine Art erkannt (404). Anderes Foto oder anderes Organ probieren.');
      if (r.status === 413) throw new Error('Foto zu groß (413).');
      if (r.status === 429) throw new Error('Tageslimit erreicht (429) — 500 Anfragen pro Tag.');
      throw new Error('HTTP ' + r.status + (server ? ' — ' + server : ''));
    }

    pnLeft = (body && typeof body.remainingIdentificationRequests === 'number')
      ? body.remainingIdentificationRequests : null;
    pnRes = ((body && body.results) || []).slice(0, 5).map(x => ({
      name: x.species && x.species.scientificNameWithoutAuthor ? x.species.scientificNameWithoutAuthor : '?',
      common: x.species && x.species.commonNames && x.species.commonNames.length ? x.species.commonNames[0] : '',
      score: x.score || 0
    }));
    if (!pnRes.length) pnErr = 'Keine Art erkannt. Anderes Foto probieren.';
  } catch (e) {
    pnErr = (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))
      ? 'Keine Verbindung. Bist du online?'
      : e.message;
  }
  pnBusy = false; render();
}

/* Abgleich mit dem Katalog: eigene Art ODER giftiger Doppelgänger? */
const norm = s => String(s || '').toLowerCase().replace(/\s*\(.*?\)\s*/g, ' ')
  .replace(/\s+(l\.|spp?\.|×|syn\.)\s*/gi, ' ').replace(/\s+/g, ' ').trim();
/* Nur Gattung + Art vergleichen — Autorenkürzel ("L.", "Spenn.") und
   Synonyme mit Zusatz stören sonst den Abgleich. */
const sp = s => norm(s).split(' ').slice(0, 2).join(' ');
function matchCatalog(latin) {
  const n = sp(latin);
  if (!n) return null;
  const herb = herbs.find(h => sp(h.latin) === n);
  if (herb) return { type: 'herb', herb };
  for (const h of herbs) for (const c of (h.conf || [])) {
    if (c.l && sp(c.l) === n) return { type: 'conf', herb: h, conf: c };
  }
  return null;
}

  const organs = [['auto', 'automatisch'], ['leaf', 'Blatt'], ['flower', 'Blüte'], ['fruit', 'Frucht'], ['bark', 'Rinde']];
  let out = `<p class="eyebrow">KI-Bilderkennung · Pl@ntNet</p><h1>Bestimmen</h1>`;

  out += pnPhoto ? `<img class="prev" src="${pnPhoto.dataUrl}" alt="">` :
    `<label class="idbox" style="display:block;cursor:pointer">
      <span class="ic">📷</span><b>Foto aufnehmen oder wählen</b>
      <p class="soft" style="font-size:13px;margin:6px 0 0">Ein klares Bild von Blatt oder Blüte, formatfüllend.</p>
      <input type="file" accept="image/*" capture="environment" hidden onchange="pnPick(event)">
    </label>`;

  if (pnPhoto) {
    out += `<div class="organs">${organs.map(([k, l]) =>
      `<button class="organ${pnOrgan === k ? ' on' : ''}" onclick="pnOrgan='${k}';render()">${l}</button>`).join('')}</div>
    <div class="acts">
      <button class="btn" onclick="pnIdentify()"${pnBusy ? ' disabled' : ''}>${pnBusy ? 'Bestimme …' : '🔍 Bestimmen'}</button>
      <label class="btn btn-o">Anderes Foto<input type="file" accept="image/*" capture="environment" hidden onchange="pnPick(event)"></label>
    </div>`;
  }
  if (pnBusy) out += `<div class="spin">Pl@ntNet vergleicht das Foto …</div>`;
  if (pnErr) out += `<div class="msg err" style="white-space:pre-wrap">${esc(pnErr)}</div>`;

  if (pnRes && pnRes.length) {
    out += `<p class="eyebrow" style="margin-top:18px">Vorschläge — nach Wahrscheinlichkeit</p>`;
    out += pnRes.map(r => {
      const m = matchCatalog(r.name);
      const pct = Math.round(r.score * 100);
      const danger = m && m.type === 'conf' && (m.conf.t || '').match(/giftig|lebensge/);
      let cls = danger ? 'res danger' : m && m.type === 'herb' ? 'res match' : 'res';
      let extra = '';
      if (danger) {
        extra = `<div class="banner" style="margin:10px 0 0">⚠ ${esc((m.conf.t || '').toUpperCase())} — das ist ein bekannter Doppelgänger von ${esc(m.herb.common)}!</div>
        <p class="pnote">${esc(m.conf.note)}</p>
        <div class="acts"><button class="btn btn-o" onclick="openHerb('${m.herb.id}')">Verwechslung ansehen</button></div>`;
      } else if (m && m.type === 'herb') {
        extra = `<div class="acts"><button class="btn" onclick="openHerb('${m.herb.id}')">Monographie öffnen</button>
        <button class="btn btn-o" onclick="logFind('${m.herb.id}')">📍 Hier gefunden</button></div>`;
      } else {
        extra = `<p class="cexp">Noch nicht in deiner Sammlung.</p>
        <div class="acts"><button class="btn btn-o" onclick="addStub('${esc(r.name)}','${esc(r.common || r.name)}')">＋ Als Merkposten aufnehmen</button></div>`;
      }
      return `<div class="${cls}">
        <div class="rt"><div><div class="rn">${esc(r.common || r.name)}</div><div class="latin">${esc(r.name)}</div></div>
        <span class="score${pct >= 50 ? ' hi' : ''}">${pct} %</span></div>${extra}</div>`;
    }).join('');
    out += `<div class="block" style="margin-top:14px"><h3 class="btitle">Wichtig</h3>
      <p style="color:var(--amber);font-weight:500">Die KI liefert einen Vorschlag, keinen Beweis.</p>
      <p class="soft">Prüfe die Leitmerkmale in der Monographie selbst — besonders bei Arten mit tödlicher Verwechslung. Ein Foto zeigt keinen Geruch, keine matte Blattunterseite, keinen Blattstiel.</p>
      ${pnLeft !== null ? `<p class="lfoot">Heute noch <b>${pnLeft}</b> Bestimmungen frei.</p>` : ''}</div>`;
  }
  out += `<div class="block" style="margin-top:14px"><h3 class="btitle">Zwischenserver</h3>
    <input id="pnp" class="key" placeholder="https://…​.workers.dev" value="${esc(pnProxy)}">
    <div class="acts"><button class="btn btn-o" onclick="savePnProxy()">Speichern</button></div>
    <p class="lfoot" style="border:none">${pnProxy ? 'Aktiv — Anfragen laufen über deinen Zwischenserver.' : '<b>Nicht gesetzt.</b> Ohne ihn blockiert Pl@ntNet die Anfragen (403). Siehe PLANTNET-PROXY.md'}</p></div>
  <div class="block"><h3 class="btitle">Schlüssel & Projekt</h3>
    <input id="pnk" class="key" value="${esc(pnKey)}">
    <div class="organs" style="margin-top:10px">
      ${[['all','Weltweit (empfohlen)'],['k-world-flora','World Flora'],['weurope','Westeuropa (alt)']].map(([k,l]) =>
        `<button class="organ${pnProject===k?' on':''}" onclick="pnProject='${k}';LS.set('pnProject','${k}');render()">${l}</button>`).join('')}
    </div>
    <div class="acts"><button class="btn btn-o" onclick="savePnKey()">Schlüssel ändern</button></div>
    <p class="lfoot" style="border:none">Pl@ntNet empfiehlt <b>Weltweit (all)</b>. „Westeuropa" ist ein Altprojekt und wird abgeschaltet — es war die wahrscheinliche Ursache des 403-Fehlers.</p></div>`;
  return out;
}


/* --- Merkposten: unvollständiger Eintrag aus einem Pl@ntNet-Treffer --- */
function slugify(latin) {
  return norm(latin).split(' ').slice(0, 2).join('-').replace(/[^a-z0-9-]/g, '');
}
function addStub(latin, common) {
  const id = slugify(latin);
  if (!id) return;
  if (herbs.some(h => h.id === id)) { msg = { ok: 1, t: 'Ist bereits in der Sammlung.' }; render(); return; }
  const stub = {
    id, common: common || latin, latin, family: '', part: [],
    feat: ['⚠ Merkposten — Leitmerkmale noch nicht erfasst.'],
    season: '', habitat: '', conf: [],
    chem: { g: [], lead: '', sol: '' },
    ind: [], expect: { ok: '', no: '' },
    prep: { f: [], why: '', dose: '' },
    safe: { ceil: '', ci: [], preg: '', int: [], flags: {}, warn:
      'MERKPOSTEN — noch keine medizinische Bewertung. Nicht anwenden, bevor eine vollständige Monographie vorliegt.' },
    harv: { t: '', m: [], o: '', st: '' },
    gard: { site: '', hard: '', prop: '', bs: '' },
    _stub: 1, _imp: 1, _added: Date.now()
  };
  herbs.push(stub);
  const imported = LS.get('imported', []);
  imported.push(stub);
  LS.set('imported', imported);
  msg = { ok: 1, t: '„' + (common || latin) + '" als Merkposten angelegt. Fotos und Fundorte kannst du jetzt schon erfassen.' };
  render();
}

/* Wunschliste: alle Merkposten als Text zum Weitergeben */
function wishList() {
  const stubs = herbs.filter(h => h._stub);
  if (!stubs.length) { msg = { ok: 0, t: 'Keine Merkposten vorhanden.' }; render(); return; }
  const txt = 'Monographien gewünscht für:\n\n' + stubs.map(h =>
    '- ' + h.common + ' (' + h.latin + ')  [id: ' + h.id + ']').join('\n') +
    '\n\nBitte im gleichen JSON-Schema wie die bestehenden Monographien, mit identischer id.';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain' }));
  a.download = 'wunschliste.txt'; a.click();
  msg = { ok: 1, t: stubs.length + ' Merkposten exportiert (wunschliste.txt).' };
  render();
}

        if (f.lowers_seizure_threshold) t.push('<span class="flag f-caution">Krampfschwelle↓</span>');

    body = `<div class="block"><h3 class="btitle">Standort</h3><p>${esc(h.gard.site)}</p></div>
    <div class="block"><h3 class="btitle">Winterhärte & Vermehrung</h3><p>${esc(h.gard.hard)}</p><p class="soft">${esc(h.gard.prop)}</p></div>
    <div class="block"><h3 class="btitle">Bodensee-Eignung</h3><p>${esc(h.gard.bs)}</p></div>`;
  } else {
    body = `<div class="msg" style="background:var(--infobg);color:var(--info);border:1px solid #C3D3E0">
    Persönliche Ebene — getrennt von den kuratierten Fakten. Wird dauerhaft auf diesem Gerät gespeichert.</div>
    <div class="block"><h3 class="btitle">Notizen</h3>
    <textarea id="nt" rows="5" placeholder="Eigene Beobachtungen, Fundhinweise, was im Garten funktioniert hat …">${esc(u.notes)}</textarea></div>
    <div class="block"><h3 class="btitle">Eigene Fotos</h3>
    <label class="btn">＋ Foto<input type="file" accept="image/*" hidden onchange="addPhoto(event,'${h.id}')"></label>
    ${!u.photos.length ? '<p class="soft" style="margin-top:9px;font-size:13px">Noch keine Fotos. Eigene Aufnahmen lösen zugleich das Lizenzproblem fremder Bilder.</p>' : ''}
    <div class="photos">${u.photos.map((p, i) => `<div class="ph"><img src="${p}" alt=""><button class="phx" onclick="delPhoto('${h.id}',${i})">×</button></div>`).join('')}</div></div>
    <div class="block"><h3 class="btitle">Fundort (Notiz)</h3>
    <input id="lc" value="${esc(u.loc)}" placeholder="z. B. Auwald bei Wollmatingen, Nordhang …"></div>
    ${(() => { const mine = finds.filter(f => f.herb === h.id); return `
    <div class="block"><h3 class="btitle">Fundorte auf der Karte</h3>
      <button class="btn" onclick="logFind('${h.id}')">📍 Hier gefunden</button>
      ${mine.length ? mapHTML(mine, true, h.id) + `<div style="margin-top:6px">${mine.map(f => `<div class="find">
          <div class="fi"><div class="fn">${new Date(f.t).toLocaleDateString('de-DE')}</div>
          <div class="fm">${f.lat.toFixed(4)}, ${f.lon.toFixed(4)}</div></div>
          <div class="fd">${relTo(f) || '—'}</div>
          <button class="fx" onclick="delFind(${f.id})">×</button></div>`).join('')}</div>`
        : '<p class="soft" style="margin-top:9px;font-size:13px">Noch keine Fundorte für ' + esc(h.common) + '. Beim nächsten Fund draußen antippen — Position wird per GPS gespeichert.</p>'}
    </div>`; })()}`;
  }
  return `<button class="back" onclick="go('${view}')">← zurück</button>
  <p class="eyebrow">${esc(h.family)} · ${esc((h.part || []).join(', '))}</p>
  <h1>${esc(h.common)}</h1><p class="latin" style="font-size:14px;margin:0 0 12px">${esc(h.latin)}</p>
  ${f.deadly_confusion ? '<div class="banner">⚠ Sicherheitskritisch: tödliche Verwechslung möglich. Bestimmung hat Vorrang vor jeder Verwendung.</div>' : ''}
  ${f.topical_only ? '<div class="banner banner-i">Nur äußerlich anwenden — nicht innerlich.</div>' : ''}
  ${h._stub ? '<div class="banner">⚠ MERKPOSTEN — noch keine medizinische Bewertung. Fotos und Fundorte kannst du bereits erfassen; Wirkung, Sicherheit und Verwechslungen fehlen noch. Nicht anwenden.</div>' : ''}
  <div class="tabs">${tabs.map(([k, l]) => `<button class="tab${layer === k ? ' on' : ''}" onclick="setLayer('${k}')">${l}${k === 'notiz' && (u.notes || u.photos.length) ? ' •' : ''}</button>`).join('')}</div>
  ${body}`;
}

/* ---------- Aktionen ---------- */
function go(v) { view = v; sel = null; msg = null; render(); window.scrollTo(0, 0); }
function setQ(v) { q = v; render(); }
function setCal(m) { calM = m; render(); }
function setReg(r) { reg = r; render(); }
function setLayer(l) {
  if (sel && layer === 'notiz') saveNotes();
  layer = l; render(); window.scrollTo(0, 0);
}
function saveNotes() {
  const nt = document.getElementById('nt'), lc = document.getElementById('lc');
  if (nt || lc) setUd(sel.id, { notes: nt ? nt.value : ud(sel.id).notes, loc: lc ? lc.value : ud(sel.id).loc });
}
function addPhoto(e, id) {
  const file = e.target.files[0]; if (!file) return;
  const img = new Image(), fr = new FileReader();
  fr.onload = () => { img.onload = () => {
    const max = 900, sc = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = img.width * sc; cv.height = img.height * sc;
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    const u = ud(id); setUd(id, { photos: [...u.photos, cv.toDataURL('image/jpeg', .75)] }); render();
  }; img.src = fr.result; };
  fr.readAsDataURL(file); e.target.value = '';
}
function delPhoto(id, i) { const u = ud(id); setUd(id, { photos: u.photos.filter((_, j) => j !== i) }); render(); }

function doImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try {
      const p = JSON.parse(fr.result), list = Array.isArray(p) ? p : [p];
      let n = 0;
      const imported = LS.get('imported', []);
      for (const o of list) {
        const h = normalize(o); if (!h) continue;
        const i = herbs.findIndex(x => x.id === h.id);
        if (i >= 0) herbs[i] = h; else herbs.push(h);
        const j = imported.findIndex(x => x.id === h.id);
        if (j >= 0) imported[j] = h; else imported.push(h);
        n++;
      }
      LS.set('imported', imported);
      msg = n ? { ok: 1, t: n + ' Monographie(n) importiert und dauerhaft gespeichert.' } : { ok: 0, t: 'Keine gültige Monographie gefunden (Pflichtfelder: id, indications).' };
    } catch (err) { msg = { ok: 0, t: 'Ungültiges JSON: ' + err.message }; }
    render();
  };
  fr.readAsText(file); e.target.value = '';
}
/* Akzeptiert sowohl das App-Format als auch das ausführliche monographie-*.json-Format */
function normalize(o) {
  if (!o || !o.id) return null;
  if (o.ind && o.common) return { ...o, _imp: 1 };            // schon App-Format
  if (!o.indications || !o.botany) return null;                // Vollformat erwartet
  const b = o.botany, id2 = o.identification || {}, s = o.safety || {}, hp = o.harvest_processing_storage || {}, g = o.garden || {};
  const ch = o.chemistry || {};
  return {
    id: o.id, common: (b.common_names_de || [o.id])[0], latin: b.scientific_name || '', family: b.family || '',
    part: b.drug_part || [], feat: id2.key_features || [], season: id2.season || '', habitat: id2.habitat || '',
    conf: (o.confusions || []).map(c => ({ n: c.name, l: c.scientific_name || '', t: c.toxicity_level || '', tox: c.toxin || '', note: c.note || c.distinguishing_features || '' })),
    chem: { g: ch.main_groups || ch.main_groups_leaf || ch.main_groups_blossom || [], lead: ch.lead_substance || '', sol: ch.solubility_note || '' },
    ind: (o.indications || []).map(i => ({ c: i.canonical || '', s: i.synonyms || [], tag: i.evidence_tag || 'TRAD', exp: i.realistic_expectation || '', src: i.source || '' })),
    expect: { ok: (o.expectation_summary || {}).plausible || '', no: (o.expectation_summary || {}).overstated || '' },
    prep: { f: (o.preparation || {}).recommended_forms || [], why: (o.preparation || {}).form_rationale || '', dose: (o.preparation || {}).standard_dose || '' },
    safe: { ceil: s.tox_ceiling || '', ci: s.contraindications || [], preg: s.pregnancy_lactation || '',
      int: (s.interactions || []).map(x => (x.mechanism || '') + (x.affected ? ' → ' + x.affected : '') + (x.clinical_relevance ? ' [' + x.clinical_relevance + ']' : '')),
      flags: s.flags || {}, warn: s.key_warning || '' },
    harv: { t: hp.harvest_time || '', m: hp.harvest_month_tags || [], o: hp.harvest_organ || '', st: hp.storage || '' },
    gard: { site: g.site_soil || '', hard: g.hardiness || '', prop: g.propagation || '', bs: g.bodensee_suitability || '' },
    _imp: 1
  };
}
function doExport() {
  const data = { imported: LS.get('imported', []), user: user, date: new Date().toISOString() };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
  a.download = 'herbarium-sicherung.json'; a.click();
}

/* ---------- Render ---------- */
function render() {
  app.innerHTML = sel ? vMono() : view === 'search' ? vSearch()
    : view === 'cal' ? vCal() : view === 'map' ? vMap() : view === 'reg' ? vReg()
    : view === 'id' ? vId() : vCat();
  nav();
  const qi = document.getElementById('q');
  if (qi) { qi.oninput = e => { q = e.target.value; const p = qi.selectionStart; render(); const n = document.getElementById('q'); if (n) { n.focus(); n.setSelectionRange(p, p); } }; }
  const ci = document.getElementById('cq');
  if (ci) { ci.oninput = e => { catQ = e.target.value; const p = ci.selectionStart; render(); const n = document.getElementById('cq'); if (n) { n.focus(); n.setSelectionRange(p, p); } }; }
  const wq = document.getElementById('wq');
  if (wq) wq.onkeydown = e => { if (e.key === 'Enter') pickSearch(); };
  const nt = document.getElementById('nt'); if (nt) nt.onblur = saveNotes;
  const lc = document.getElementById('lc'); if (lc) lc.onblur = saveNotes;
  hydrate();
  hydrateTiles();
  bindMap();
}
render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script></body></html>
